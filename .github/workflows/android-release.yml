name: android-release

# Build a debug APK on every PR, and a release APK + GitHub Release asset
# whenever a tag matching `v*` is pushed.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # required to upload Release assets when a tag is pushed

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The Gradle `syncWebAssets` task shells out to `./bin/npm run -w
      # @douyin-tool/web build`, which transitively requires npm install at
      # the workspace root. Doing it explicitly here keeps the build log
      # readable and lets npm cache properly.
      - name: Install workspace deps
        run: npm ci --ignore-scripts

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Run Android unit tests
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      # On a tag we want the signed release APK; on push/PR a debug APK is
      # plenty to validate the build.
      - name: Build APK
        working-directory: android
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ./gradlew :app:assembleRelease --stacktrace
          else
            ./gradlew :app:assembleDebug --stacktrace
          fi

      - name: Stage APK
        id: stage
        run: |
          mkdir -p out
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF##refs/tags/}"
            cp android/app/build/outputs/apk/release/app-release.apk \
               "out/douyin-tool-${TAG}.apk"
            echo "kind=release" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk out/app-debug.apk
            echo "kind=debug" >> "$GITHUB_OUTPUT"
          fi
          ls -la out

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: douyin-tool-apk-${{ steps.stage.outputs.kind }}
          path: out/*.apk
          if-no-files-found: error

      # Only when the workflow was triggered by a tag: publish (or update) a
      # GitHub Release and attach the signed APK.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.stage.outputs.tag }}
          name: ${{ steps.stage.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: out/*.apk
